---
layout: webapp
title: Icebreaker Questions
description: A lightweight random question picker for conversation prompts.
---

<p class="lead">
  Pick a random prompt and keep clicking until you find one you want to use.
</p>
<button id="getQuestionBtn" type="button">Get a Random Question</button>
<div id="questionBox" aria-live="polite"></div>
<p class="helper-text">
  Source:
  <a href="https://forum.effectivealtruism.org/posts/85tCJ6efR2hsQzZvu/big-list-of-icebreaker-questions?utm_campaign=post_share&utm_source=link">EA Forum</a>.
</p>

<script>
  const questionBox = document.getElementById('questionBox');
  const button = document.getElementById('getQuestionBtn');
  let questions = [];

  fetch('{{ "/questions.txt" | relative_url }}')
    .then((response) => response.text())
    .then((data) => {
      questions = data
        .split('\n')
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    })
    .catch((error) => {
      console.error("Error loading questions:", error);
      questionBox.innerText = "The question list could not be loaded.";
    });

  button.addEventListener('click', () => {
    if (questions.length === 0) {
      questionBox.innerText = "No questions found or the file has not loaded yet.";
      return;
    }

    const randomIndex = Math.floor(Math.random() * questions.length);
    questionBox.innerText = questions[randomIndex];
  });
</script>
